name: Daily News Bot

on:
  schedule:
    - cron: "30 4 * * *"

  workflow_dispatch:

jobs:
  run-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_ID_2: ${{ secrets.CHANNEL_ID_2 }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python main.py

      # 🔄 Save the updated tracker.json index back to the GitHub repository
      - name: Commit and push tracker update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker.json
          # Only commit and push if tracker.json actually changed (i.e. fallback was triggered)
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-increment econ word index tracker" && git push)
